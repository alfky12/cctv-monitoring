version: "3.9"

services:
  cctv-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cctv-monitoring
    restart: unless-stopped
    depends_on:
      - mediamtx
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      SERVER_PORT: 3003
      MEDIAMTX_HOST: mediamtx
      MEDIAMTX_API_PORT: 9123
      MEDIAMTX_RTSP_PORT: 8555
      MEDIAMTX_HLS_PORT: 8856
      MEDIAMTX_PUBLIC_HLS_URL: ""
    volumes:
      - ./config.json:/app/config.json
      - ./cameras.db:/app/cameras.db
      - ./recordings:/app/recordings
    networks:
      - cctv-net

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "8555:8555" # RTSP
      - "8856:8856" # HLS
      - "9123:9123" # API
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
      - ./recordings:/recordings
    networks:
      - cctv-net

networks:
  cctv-net:
    driver: bridge
