paths:
  all:
    source: publisher

###############################################
# Global settings

# CATATAN: record: false di sini (default)
# Rekaman diaktifkan hanya untuk path cam_X (transcoded) via API oleh Node.js
# Path cam_X_input (raw) TIDAK direkam untuk menghindari duplikasi
record: false
recordPath: ./recordings/%path/%Y-%m-%d_%H-%M-%S-%f
recordFormat: fmp4
recordDeleteAfter: 7d
runOnRecordSegmentComplete: ./record_notify.sh


# RTSP
rtspAddress: :8555
rtpAddress: :8050
rtcpAddress: :8051

# RTMP
rtmpAddress: :1936

# HLS
hlsAddress: :8856
hlsVariant: fmp4

# WebRTC
webrtcAddress: :8890
webrtcLocalUDPAddress: :8190

# API
api: yes
apiAddress: :9123
