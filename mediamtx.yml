paths:
  all:
    source: publisher

###############################################
# Global settings

record: yes
recordPath: ./recordings/%path/%Y-%m-%d_%H-%M-%S.mp4
recordFormat: fmp4

# RTSP
rtspAddress: :8555
rtpAddress: :8050
rtcpAddress: :8051

# RTMP
rtmpAddress: :1936

# HLS
hlsAddress: :8856
hlsVariant: fmp4

# WebRTC
webrtcAddress: :8890
webrtcLocalUDPAddress: :8190

# API
api: yes
apiAddress: :9123
